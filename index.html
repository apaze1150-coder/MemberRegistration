<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #fcf9f8;
        }
        .hero-gradient {
            background: linear-gradient(-45deg, #00317e, #0046ad, #001847, #fcf9f8);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
        .input-focus-ring:focus {
            outline: none;
            border-color: #00317e;
            box-shadow: 0 0 0 4px rgba(0, 49, 126, 0.15), 0 0 10px rgba(0, 49, 126, 0.1);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(229, 231, 235, 1);
        }
        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }
        .stagger-4 { animation-delay: 0.4s; }
        .stagger-5 { animation-delay: 0.5s; }

        .btn-shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

<body class="min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-primary shadow-md flex items-center justify-between px-margin-mobile md:px-margin-desktop h-16">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-on-primary active:scale-95 duration-100 p-2 hover:bg-primary-container rounded-full">menu</button>
<span class="font-headline-sm text-headline-sm-mobile md:text-headline-sm font-bold text-on-primary tracking-tight">KINGPOWER POWER PASS</span>
</div>
<div class="flex items-center">
<button class="material-symbols-outlined text-on-primary active:scale-95 duration-100 p-2 hover:bg-primary-container rounded-full">language</button>
</div>
</header>
<main class="flex-grow pt-16 pb-24">
<!-- Hero Section -->
<section class="hero-gradient pt-12 pb-12 px-margin-mobile flex flex-col items-center text-center relative overflow-hidden">
<div class="absolute inset-0 bg-white/5 pointer-events-none"></div>
<div class="mb-8 transform hover:scale-105 transition-transform duration-500 animate-fade-up stagger-1">
<img alt="POWER PASS Logo" class="w-auto drop-shadow-2xl h-16 md:h-20" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC1NEOjA0RYY6jvEDg6CEVfej7fpHpOtvSIizsf3EHCuemfASxXoLslzk3AWenqPLku4DSWleRy0UKcFXZAFddxXYtUK3mmyyhbdPaURDNAb0tJ1juzh5HZBZgrnMe20S5mNcueh2TDkRmQJfWHsM9DxK3EIdXp7iBX2Qlxh046I_Nkplrd3o3AtkpeE_25xxy-WtCH9bcGXGkdujfQpnIIGuNeo2Yy-Bg5NCFo4A1e6qcHblh1cd4Y_TBIF7g2xAZtO93t0dUV5po"/>
</div>
<div class="max-w-2xl mx-auto animate-fade-up stagger-2">
<h1 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg text-primary mb-2">Member Registration</h1>
<p class="font-body-md text-body-md text-on-surface-variant opacity-80">Elevate your retail experience with exclusive global benefits.</p>
</div>
</section>
<!-- Registration Form Container -->
<section class="px-margin-mobile md:px-0 max-w-[600px] mx-auto -mt-4 relative z-10 animate-fade-up stagger-3">
<div class="glass-card rounded-xl p-6 md:p-10 shadow-xl space-y-gutter">
<!-- Shop Name Field -->
<div class="space-y-2 opacity-0 animate-fade-up stagger-4 fill-mode-forwards">
<label class="block font-label-md text-label-md text-on-surface" for="shop_name">
                    ชื่อร้านค้า / Shop Name
                </label>
<input class="w-full h-12 px-4 bg-white border border-outline-variant rounded-lg font-body-md text-body-md input-focus-ring transition-all placeholder:text-on-surface-variant/40" id="shop_name" placeholder="ระบุชื่อร้านค้าของคุณ" type="text"/>
</div>
<!-- Email Field -->
<div class="space-y-2 opacity-0 animate-fade-up stagger-5 fill-mode-forwards">
<label class="block font-label-md text-label-md text-on-surface" for="email">
                    อีเมล / Email (电子邮箱)
                </label>
<input class="w-full h-12 px-4 bg-white border border-outline-variant rounded-lg font-body-md text-body-md input-focus-ring transition-all placeholder:text-on-surface-variant/40" id="email" placeholder="example@email.com" type="email"/>
<p class="font-label-sm text-label-sm text-on-surface-variant/70 italic">
                    กรุณากรอกอีเมลที่ถูกต้อง / 请输入正确的电子邮箱
                </p>
</div>
<!-- Actions -->
<div class="flex flex-col sm:flex-row gap-3 opacity-0 animate-fade-up stagger-5 fill-mode-forwards">
<button class="flex-[2] h-14 bg-primary hover:bg-primary-container hover:scale-[1.02] active:scale-[0.98] text-on-primary font-headline-sm text-headline-sm rounded-lg shadow-md transition-all flex items-center justify-center gap-2 group" onclick="generateMessage()">
<span class="material-symbols-outlined group-hover:rotate-12 transition-transform">message</span>
                    สร้างข้อความ / Generate Message
                </button>
<button class="flex-1 h-14 bg-white border-2 border-outline hover:bg-surface-container hover:border-error hover:text-error text-on-surface font-label-md text-label-md rounded-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2" id="clear_btn" onclick="clearForm()">
<span class="material-symbols-outlined">delete_sweep</span>
                    ล้างข้อมูล / Clear
                </button>
</div>
<!-- Preview Area -->
<div class="space-y-3 hidden transition-all duration-500 origin-top" id="preview_container">
<label class="block font-label-md text-label-md text-on-surface">
                    Preview / ตัวอย่างข้อความ
                </label>
<div class="w-full min-h-[100px] p-4 bg-surface-container-low border border-outline-variant border-dashed rounded-lg font-body-md text-body-md text-on-surface-variant whitespace-pre-wrap animate-fade-up" id="message_preview">
                    The combined message will appear here...
                </div>
</div>
<!-- Secondary Action -->
<div class="hidden flex-col sm:flex-row gap-4 transition-all duration-500" id="copy_action">
<button class="flex-1 h-14 bg-secondary-container hover:bg-secondary text-on-secondary-container hover:text-on-secondary font-headline-sm text-headline-sm rounded-lg active:scale-95 transition-all flex items-center justify-center gap-2 border border-secondary/20 hover:shadow-lg animate-pulse-gentle" id="copy_btn" onclick="copyToClipboard()">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">content_copy</span>
                    คัดลอกข้อความ
                </button>
<button class="flex-1 h-14 bg-[#06C755] hover:bg-[#05a848] text-white font-headline-sm text-headline-sm rounded-lg active:scale-95 transition-all flex items-center justify-center gap-2 hover:shadow-lg">
<span class="material-symbols-outlined">chat</span>
                    ส่งไปที่ Line
                </button>
</div>
</div>

<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 bg-surface border-t border-outline-variant flex justify-around items-center h-20 px-2 pb-safe">
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high w-full h-full transition-colors" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-label-sm text-label-sm">Home</span>
</a>
<a class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-4 py-1 mx-2 active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person_add</span>
<span class="font-label-sm text-label-sm">Register</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high w-full h-full transition-colors" href="#">
<span class="material-symbols-outlined">history</span>
<span class="font-label-sm text-label-sm">History</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high w-full h-full transition-colors" href="#">
<span class="material-symbols-outlined">account_circle</span>
<span class="font-label-sm text-label-sm">Profile</span>
</a>
</nav>
<script>
    function generateMessage() {
        const shopName = document.getElementById('shop_name').value.trim();
        const email = document.getElementById('email').value.trim();
        const preview = document.getElementById('message_preview');
        const previewContainer = document.getElementById('preview_container');
        const copyAction = document.getElementById('copy_action');

        if (!shopName || !email) {
            alert('Please fill in both Shop Name and Email / กรุณากรอกข้อมูลให้ครบถ้วน');
            return;
        }

        const formattedMessage = `KINGPOWER POWER PASS REGISTRATION\n--------------------------\nSHOP: ${shopName}\nEMAIL: ${email}\n--------------------------\nDate: ${new Date().toLocaleDateString('en-GB')}`;
        
        preview.innerText = formattedMessage;
        preview.classList.remove('text-on-surface-variant/40');
        preview.classList.add('text-on-surface');
        
        previewContainer.classList.remove('hidden');
        previewContainer.classList.add('flex', 'animate-fade-up');
        
        copyAction.classList.remove('hidden');
        copyAction.classList.add('flex', 'animate-fade-up');
    }

    function clearForm() {
        const btn = document.getElementById('clear_btn');
        btn.classList.add('btn-shake');
        setTimeout(() => btn.classList.remove('btn-shake'), 400);

        document.getElementById('shop_name').value = '';
        document.getElementById('email').value = '';
        
        const preview = document.getElementById('message_preview');
        const previewContainer = document.getElementById('preview_container');
        const copyAction = document.getElementById('copy_action');
        
        preview.innerText = 'The combined message will appear here...';
        preview.classList.add('text-on-surface-variant/40');
        preview.classList.remove('text-on-surface');
        
        previewContainer.classList.add('hidden');
        copyAction.classList.add('hidden');
    }

    async function copyToClipboard() {
        const text = document.getElementById('message_preview').innerText;
        try {
            await navigator.clipboard.writeText(text);
            const btn = document.getElementById('copy_btn');
            const originalContent = btn.innerHTML;
            btn.innerHTML = `<span class="material-symbols-outlined">check_circle</span> Copied!`;
            btn.classList.add('bg-green-500', 'text-white');
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.classList.remove('bg-green-500', 'text-white');
            }, 2000);
        } catch (err) {
            console.error('Failed to copy: ', err);
        }
    }
</script>
</body></html>
